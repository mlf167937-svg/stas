<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stickman War 2D — STAS Arena</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg:     #0a0c12;
    --c-arena:  #111520;
    --c-p1:     #38d9f5;
    --c-p2:     #f54f38;
    --c-gold:   #f5c832;
    --c-ui:     rgba(255,255,255,0.08);
    --c-uib:    rgba(255,255,255,0.18);
    --radius:   12px;
    --font:     'Segoe UI', system-ui, sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--c-bg);
    overflow: hidden;
    font-family: var(--font);
    color: #fff;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    background: var(--c-bg);
    transition: opacity .35s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── MENU ── */
  #menuScreen { gap: 24px; }
  .logo-wrap { text-align: center; margin-bottom: 8px; }
  .logo-sub  { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--c-gold); opacity: .7; margin-bottom: 6px; }
  .logo-title {
    font-size: clamp(28px, 7vw, 52px);
    font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--c-p1), #fff 50%, var(--c-p2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .mode-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .mode-card {
    background: var(--c-ui);
    border: 1px solid var(--c-uib);
    border-radius: var(--radius);
    padding: 22px 28px; width: 220px; cursor: pointer;
    transition: transform .18s, border-color .18s, box-shadow .18s;
    text-align: center;
  }
  .mode-card:hover, .mode-card:active {
    transform: translateY(-4px) scale(1.03);
    border-color: var(--c-gold);
    box-shadow: 0 8px 32px rgba(245,200,50,.18);
  }
  .mode-card .mc-icon { font-size: 36px; margin-bottom: 10px; }
  .mode-card .mc-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .mode-card .mc-desc  { font-size: 11px; opacity: .55; line-height: 1.5; }

  /* online lobby */
  #lobbyPanel {
    display: none; flex-direction: column; align-items: center; gap: 14px;
    background: var(--c-ui); border: 1px solid var(--c-uib);
    border-radius: var(--radius); padding: 24px 32px; width: min(380px,90vw);
  }
  #lobbyPanel.active { display: flex; }
  #lobbyPanel h3 { font-size: 16px; font-weight: 700; color: var(--c-gold); }
  #lobbyPanel input {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.2);
    color: #fff; font-size: 14px; outline: none;
  }
  #lobbyPanel input::placeholder { opacity: .4; }
  #lobbyStatus { font-size: 12px; opacity: .6; min-height: 18px; }

  .btn {
    padding: 11px 28px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 700; letter-spacing: .5px;
    transition: transform .12s, opacity .12s;
  }
  .btn:active { transform: scale(.96); }
  .btn-gold  { background: var(--c-gold); color: #111; }
  .btn-ghost { background: var(--c-ui); border: 1px solid var(--c-uib); color: #fff; }

  /* ── RESULT SCREEN ── */
  #resultScreen { gap: 18px; }
  #resultTitle { font-size: clamp(24px,6vw,42px); font-weight: 900; }
  #resultSub   { font-size: 14px; opacity: .55; }
  .result-btns { display: flex; gap: 12px; }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 10px 16px 0;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 5; pointer-events: none;
  }
  .hud-player { display: flex; flex-direction: column; gap: 4px; width: 38%; }
  .hud-player.p2 { align-items: flex-end; }
  .hud-name { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .hud-name.p1c { color: var(--c-p1); }
  .hud-name.p2c { color: var(--c-p2); }
  .hud-weapon { font-size: 10px; opacity: .6; }
  .hp-bar-bg {
    height: 10px; border-radius: 5px;
    background: rgba(255,255,255,.1); overflow: hidden;
    width: 100%;
  }
  .hp-bar-fill { height: 100%; border-radius: 5px; transition: width .12s; }
  .hp-bar-fill.p1f { background: linear-gradient(90deg,#0af,var(--c-p1)); }
  .hp-bar-fill.p2f { background: linear-gradient(90deg,var(--c-p2),#f80); }
  .hud-center {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  #timerDisplay {
    font-size: 22px; font-weight: 900; letter-spacing: 1px;
    color: var(--c-gold);
    font-variant-numeric: tabular-nums;
  }
  #roundDisplay { font-size: 10px; opacity: .45; letter-spacing: 2px; text-transform: uppercase; }

  /* ── CANVAS ── */
  #gameCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
    z-index: 1;
  }

  /* ── JOYSTICK UI ── */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 180px; z-index: 6;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 20px 20px;
    pointer-events: none;
  }
  .ctrl-side { display: flex; gap: 16px; align-items: flex-end; pointer-events: all; }
  .ctrl-side.right { flex-direction: row-reverse; }

  .joystick-wrap {
    position: relative; width: 110px; height: 110px;
  }
  .joystick-base {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    border: 2px solid rgba(255,255,255,.14);
  }
  .joystick-knob {
    position: absolute;
    width: 44px; height: 44px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    transition: transform .05s;
    pointer-events: none;
  }
  .joystick-knob.p1k { background: radial-gradient(circle at 35% 35%, #7ef, var(--c-p1)); }
  .joystick-knob.p2k { background: radial-gradient(circle at 35% 35%, #fbb, var(--c-p2)); }

  .hit-btn {
    width: 78px; height: 78px; border-radius: 50%; border: none; cursor: pointer;
    font-size: 28px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    transition: transform .08s, box-shadow .08s;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  .hit-btn:active { transform: scale(.88); box-shadow: none; }
  .hit-btn.p1h {
    background: radial-gradient(circle at 35% 35%, #aff, var(--c-p1));
    color: #003;
  }
  .hit-btn.p2h {
    background: radial-gradient(circle at 35% 35%, #fcc, var(--c-p2));
    color: #300;
  }
  #ctrl-p2.hidden { display: none; }
</style>
</head>
<body>

<!-- ═══════════════ MENU SCREEN ═══════════════ -->
<div id="menuScreen" class="screen">
  <div class="logo-wrap">
    <div class="logo-sub">STAS Arena Presents</div>
    <div class="logo-title">STICKMAN WAR 2D</div>
  </div>

  <div class="mode-cards">
    <div class="mode-card" id="btn1HP">
      <div class="mc-icon">⚔️</div>
      <div class="mc-title">MODE 1 HP</div>
      <div class="mc-desc">Dua pemain, satu layar.<br>Joystick kiri &amp; kanan.</div>
    </div>
    <div class="mode-card" id="btnOnline">
      <div class="mc-icon">🌐</div>
      <div class="mc-title">ONLINE MULTIPLAYER</div>
      <div class="mc-desc">Lawan pemain lain<br>via WebSocket real-time.</div>
    </div>
  </div>

  <div id="lobbyPanel">
    <h3>🌐 Online Multiplayer</h3>
    <input id="roomInput" type="text" placeholder="Nama Room (cth: arena01)" maxlength="20">
    <input id="nameInput" type="text" placeholder="Username kamu" maxlength="16">
    <div id="lobbyStatus">Masukkan nama room &amp; username</div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-gold" id="btnJoin">Gabung Room</button>
      <button class="btn btn-ghost" id="btnBackMenu">Kembali</button>
    </div>
  </div>
</div>

<!-- ═══════════════ RESULT SCREEN ═══════════════ -->
<div id="resultScreen" class="screen hidden">
  <div id="resultTitle">PLAYER 1 MENANG!</div>
  <div id="resultSub">Ronde selesai</div>
  <div class="result-btns">
    <button class="btn btn-gold" id="btnPlayAgain">Main Lagi</button>
    <button class="btn btn-ghost" id="btnMainMenu">Menu Utama</button>
  </div>
</div>

<!-- ═══════════════ HUD ═══════════════ -->
<div id="hud" style="display:none;">
  <div class="hud-player">
    <div class="hud-name p1c" id="p1Name">PLAYER 1</div>
    <div class="hud-weapon" id="p1Weapon">—</div>
    <div class="hp-bar-bg"><div class="hp-bar-fill p1f" id="hpBar1" style="width:100%"></div></div>
  </div>
  <div class="hud-center">
    <div id="timerDisplay">—</div>
    <div id="roundDisplay">RONDE 1</div>
  </div>
  <div class="hud-player p2">
    <div class="hud-name p2c" id="p2Name">PLAYER 2</div>
    <div class="hud-weapon" id="p2Weapon">—</div>
    <div class="hp-bar-bg"><div class="hp-bar-fill p2f" id="hpBar2" style="width:100%"></div></div>
  </div>
</div>

<!-- ═══════════════ CANVAS ═══════════════ -->
<canvas id="gameCanvas"></canvas>

<!-- ═══════════════ CONTROLS ═══════════════ -->
<div id="controls" style="display:none;">
  <!-- Player 1 left side -->
  <div class="ctrl-side left" id="ctrl-p1">
    <div class="joystick-wrap" id="js1">
      <div class="joystick-base"></div>
      <div class="joystick-knob p1k" id="jk1"></div>
    </div>
    <button class="hit-btn p1h" id="hitBtn1">⚔</button>
  </div>

  <!-- Player 2 right side -->
  <div class="ctrl-side right" id="ctrl-p2">
    <div class="joystick-wrap" id="js2">
      <div class="joystick-base"></div>
      <div class="joystick-knob p2k" id="jk2"></div>
    </div>
    <button class="hit-btn p2h" id="hitBtn2">⚔</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   STICKMAN WAR 2D  —  STAS Arena
   Full game engine (1HP Mode + Online Multiplayer skeleton)
══════════════════════════════════════════════ */

// ── CONFIG ──────────────────────────────────
const CFG = {
  MAX_HP: 100,
  GRAVITY: 0.55,
  JUMP_POWER: -14,
  MOVE_SPD: 4.5,
  GROUND_H: 60,          // px from bottom of canvas
  ROUND_TIME: 99,        // seconds per round

  WEAPONS: {
    KATANA: {
      name: '⚔️ Katana',
      color: '#b0d8ff',
      damage: 9,
      cooldown: 280,      // ms
      range: 70,
      knockback: 3,
      swing: 'melee',
      swingDur: 180,
      label: '⚔️ Katana',
    },
    MACE: {
      name: '🛡️ Palu Gada',
      color: '#e0a860',
      damage: 22,
      cooldown: 900,
      range: 90,
      knockback: 14,
      swing: 'melee',
      swingDur: 450,
      label: '🛡️ Gada',
    },
    BOW: {
      name: '🏹 Busur',
      color: '#a8e88a',
      damage: 18,
      cooldown: 1100,
      range: 9999,
      knockback: 2,
      swing: 'projectile',
      projSpeed: 11,
      projCount: 1,
      spread: 0,
      projW: 22, projH: 5,
      label: '🏹 Busur',
    },
    LASER: {
      name: '🔫 Laser',
      color: '#ff66ff',
      damage: 8,
      cooldown: 420,      // burst interval
      range: 9999,
      knockback: 1.5,
      swing: 'projectile',
      projSpeed: 18,
      projCount: 2,
      spread: 0.07,       // radians
      projW: 14, projH: 4,
      label: '🔫 Laser',
      burst: true,        // fires 2 in quick succession
    },
  },
};

const WEAPON_KEYS = Object.keys(CFG.WEAPONS);

// ── STATE ────────────────────────────────────
let gameMode   = null;   // '1hp' | 'online'
let gameActive = false;
let round      = 1;
let roundTimer = CFG.ROUND_TIME;
let timerInterval = null;
let screenShake = 0;

// ── CANVAS SETUP ─────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── PARTICLES / EFFECTS ──────────────────────
let particles = [];
let floatTexts = [];
let projectiles = [];

function spawnParticle(x, y, color, vx, vy, size, life) {
  particles.push({ x, y, color, vx, vy, size, life, maxLife: life });
}
function spawnFloat(x, y, text, color) {
  floatTexts.push({ x, y, text, color, life: 60, maxLife: 60, vy: -1.4 });
}

// ── PLAYER CLASS ─────────────────────────────
class Player {
  constructor(id, x, color, facing) {
    this.id       = id;
    this.x        = x;
    this.y        = 0;   // set on spawn
    this.vx       = 0;
    this.vy       = 0;
    this.w        = 32;
    this.h        = 80;
    this.color    = color;
    this.facing   = facing;  // 1 = right, -1 = left
    this.hp       = CFG.MAX_HP;
    this.onGround = false;
    this.weapon   = null;
    this.swingTimer  = 0;   // ms remaining in swing animation
    this.cooldownTimer = 0; // ms remaining cooldown
    this.walkFrame = 0;
    this.walkPhase = 0;
    this.isMoving  = false;
    this.knockbackVx = 0;
    this.dead = false;
    // burst tracking for laser
    this.burstCount = 0;
    this.burstTimer = 0;
  }

  assignWeapon(key) {
    this.weapon = { ...CFG.WEAPONS[key], key };
    this.cooldownTimer = 0;
    this.swingTimer = 0;
  }

  get groundY() {
    return canvas.height - CFG.GROUND_H - this.h;
  }

  update(dt) {
    if (this.dead) return;
    // knockback decay
    this.knockbackVx *= 0.78;
    this.vx += this.knockbackVx * 0.1;

    // gravity
    this.vy += CFG.GRAVITY;
    this.x  += this.vx + this.knockbackVx;
    this.y  += this.vy;

    // ground
    const gy = this.groundY;
    if (this.y >= gy) { this.y = gy; this.vy = 0; this.onGround = true; }
    else { this.onGround = false; }

    // wall bounds
    this.x = Math.max(10, Math.min(canvas.width - this.w - 10, this.x));

    // friction
    this.vx *= 0.80;

    // timers (dt in ms)
    if (this.cooldownTimer > 0)  this.cooldownTimer  -= dt;
    if (this.swingTimer > 0)     this.swingTimer     -= dt;
    if (this.burstTimer > 0)     this.burstTimer     -= dt;

    // walk animation
    this.walkPhase += this.isMoving ? 0.18 : 0;
    this.isMoving = false;
  }

  move(dx) {
    if (this.dead) return;
    this.vx = dx * CFG.MOVE_SPD;
    if (dx !== 0) {
      this.facing = dx > 0 ? 1 : -1;
      this.isMoving = true;
    }
  }

  jump() {
    if (this.onGround && !this.dead) {
      this.vy = CFG.JUMP_POWER;
    }
  }

  attack(other) {
    if (this.dead || !this.weapon) return;
    if (this.cooldownTimer > 0) return;

    const w = this.weapon;
    this.swingTimer = w.swingDur;
    this.cooldownTimer = w.cooldown;

    if (w.swing === 'melee') {
      // range check
      const dx = (other.x + other.w/2) - (this.x + this.w/2);
      if (Math.abs(dx) < w.range && Math.sign(dx) === this.facing) {
        this.dealDamage(other, w.damage, w.knockback, this.facing);
      }
      // hit particles
      for (let i = 0; i < 10; i++) {
        spawnParticle(
          this.x + this.w/2 + this.facing * w.range * .7,
          this.y + this.h * .35,
          w.color,
          (Math.random()-.5)*5 + this.facing * 3,
          (Math.random()-.5)*5 - 2,
          Math.random()*5+2, 28
        );
      }
    } else {
      // projectile
      if (w.burst && this.burstCount < w.projCount) {
        this._fireLaserBurst(other, w);
      } else {
        this._fireSingle(w);
      }
    }
  }

  _fireSingle(w) {
    const ox = this.x + this.w/2 + this.facing * 20;
    const oy = this.y + this.h * .3;
    projectiles.push({
      x: ox, y: oy,
      vx: w.projSpeed * this.facing,
      vy: 0,
      w: w.projW, h: w.projH,
      color: w.color,
      owner: this.id,
      damage: w.damage,
      knockback: w.knockback,
      life: 120,
    });
    // muzzle flash
    for (let i = 0; i < 6; i++) {
      spawnParticle(ox, oy, w.color, this.facing*(4+Math.random()*5), (Math.random()-.5)*4, Math.random()*4+2, 14);
    }
  }

  _fireLaserBurst(other, w) {
    // fire 2 projectiles with slight spread in quick succession
    for (let i = 0; i < w.projCount; i++) {
      const delay = i * 120;
      setTimeout(() => {
        if (!gameActive) return;
        const spread = (Math.random() - .5) * w.spread;
        const ox = this.x + this.w/2 + this.facing * 20;
        const oy = this.y + this.h * .3 + (Math.random()-.5)*8;
        const vx = Math.cos(spread) * w.projSpeed * this.facing;
        const vy = Math.sin(spread) * w.projSpeed;
        projectiles.push({ x:ox, y:oy, vx, vy, w:w.projW, h:w.projH, color:w.color, owner:this.id, damage:w.damage, knockback:w.knockback, life:100 });
        for (let j=0;j<5;j++) spawnParticle(ox,oy,w.color,this.facing*(3+Math.random()*4),(Math.random()-.5)*3,Math.random()*3+1,10);
      }, delay);
    }
  }

  dealDamage(other, dmg, kb, dir) {
    if (other.dead) return;
    other.hp = Math.max(0, other.hp - dmg);
    other.knockbackVx = dir * kb * 1.8;
    other.vy = -3;
    // floating text
    spawnFloat(other.x + other.w/2, other.y - 10, `-${dmg}`, this.color);
    // screen shake
    screenShake = Math.min(screenShake + 8, 18);
    // blood particles
    for (let i = 0; i < 12; i++) {
      spawnParticle(other.x+other.w/2, other.y+other.h*.3, other.color, (Math.random()-.5)*6, (Math.random()-.5)*6-2, Math.random()*5+2, 35);
    }
    updateHpBars();
    if (other.hp <= 0) endRound(this);
  }

  get centerX() { return this.x + this.w / 2; }
  get centerY() { return this.y + this.h / 2; }
  get headY()   { return this.y + 12; }
  get torsoY()  { return this.y + 30; }
  get hipY()    { return this.y + 52; }

  draw(ctx) {
    if (this.dead) return;
    ctx.save();
    const sw = this.swingTimer > 0;
    const swingProg = sw ? (this.weapon.swingDur - this.swingTimer) / this.weapon.swingDur : 0;

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath();
    ctx.ellipse(this.centerX, this.y + this.h + 4, 22, 7, 0, 0, Math.PI*2);
    ctx.fill();

    // ── BODY ──
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';

    // head
    ctx.beginPath();
    ctx.arc(this.centerX, this.headY, 13, 0, Math.PI*2);
    ctx.stroke();
    // eyes
    ctx.fillStyle = this.color;
    const ex = this.centerX + this.facing * 5;
    ctx.beginPath(); ctx.arc(ex, this.headY - 1, 2.5, 0, Math.PI*2); ctx.fill();

    // torso
    ctx.beginPath();
    ctx.moveTo(this.centerX, this.headY + 13);
    ctx.lineTo(this.centerX, this.hipY);
    ctx.stroke();

    // legs (walk animation)
    const legAngle = Math.sin(this.walkPhase) * 0.6;
    const legLen = 28;
    // left leg
    ctx.beginPath();
    ctx.moveTo(this.centerX, this.hipY);
    ctx.lineTo(this.centerX + Math.sin(-legAngle)*legLen, this.hipY + Math.cos(legAngle)*legLen);
    ctx.stroke();
    // right leg
    ctx.beginPath();
    ctx.moveTo(this.centerX, this.hipY);
    ctx.lineTo(this.centerX + Math.sin(legAngle)*legLen, this.hipY + Math.cos(legAngle)*legLen);
    ctx.stroke();

    // ── ARMS & WEAPON ──
    this._drawArmsAndWeapon(ctx, sw, swingProg);

    ctx.restore();
  }

  _drawArmsAndWeapon(ctx, swinging, prog) {
    const w  = this.weapon;
    const shoulderX = this.centerX;
    const shoulderY = this.torsoY;
    const armLen = 24;

    // idle arm angle
    const baseAngle = this.facing === 1 ? -0.4 : Math.PI + 0.4;

    // passive arm (always same)
    const passAng = this.facing === 1 ? baseAngle - Math.PI*0.6 : baseAngle + Math.PI*0.6;
    const pArmX = shoulderX + Math.cos(passAng) * armLen;
    const pArmY = shoulderY + Math.sin(passAng) * armLen;
    ctx.beginPath();
    ctx.moveTo(shoulderX, shoulderY);
    ctx.lineTo(pArmX, pArmY);
    ctx.stroke();

    // weapon arm
    let weapAngle = baseAngle;
    if (swinging && w) {
      if (w.swing === 'melee') {
        const swingArc = (w.key === 'MACE') ? Math.PI * 0.85 : Math.PI * 0.65;
        weapAngle = baseAngle - this.facing * swingArc * prog;
      }
    }

    const wArmX = shoulderX + Math.cos(weapAngle) * armLen;
    const wArmY = shoulderY + Math.sin(weapAngle) * armLen;
    ctx.beginPath();
    ctx.moveTo(shoulderX, shoulderY);
    ctx.lineTo(wArmX, wArmY);
    ctx.stroke();

    // draw weapon icon at hand
    if (w) this._drawWeaponHead(ctx, wArmX, wArmY, weapAngle, swinging, prog, w);
  }

  _drawWeaponHead(ctx, hx, hy, ang, swinging, prog, w) {
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(ang + (this.facing === 1 ? 0 : Math.PI));

    if (w.key === 'KATANA') {
      // blade
      ctx.strokeStyle = '#c8e8ff';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(42, 0); ctx.stroke();
      // guard
      ctx.strokeStyle = w.color; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(0,8); ctx.stroke();
      if (swinging && prog > .3) {
        // slash trail
        ctx.strokeStyle = 'rgba(180,220,255,.3)'; ctx.lineWidth = 10;
        ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(40,0); ctx.stroke();
      }
    } else if (w.key === 'MACE') {
      // handle
      ctx.strokeStyle = '#b8885a'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(38,0); ctx.stroke();
      // head
      ctx.fillStyle = w.color;
      ctx.beginPath(); ctx.arc(44, 0, 12, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.stroke();
      // spikes
      for (let i=0;i<6;i++) {
        const a = i * Math.PI/3;
        ctx.beginPath();
        ctx.moveTo(44+Math.cos(a)*12, Math.sin(a)*12);
        ctx.lineTo(44+Math.cos(a)*18, Math.sin(a)*18);
        ctx.strokeStyle = w.color; ctx.lineWidth = 2.5; ctx.stroke();
      }
      if (swinging && prog > .5) {
        ctx.strokeStyle = 'rgba(224,168,96,.2)'; ctx.lineWidth = 18;
        ctx.beginPath(); ctx.arc(22, 0, 22, -Math.PI*.3, Math.PI*.3); ctx.stroke();
      }
    } else if (w.key === 'BOW') {
      // bow arc
      ctx.strokeStyle = '#8b6432'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0,0,22,-.9,.9); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,22,Math.PI-.9,Math.PI+.9); ctx.stroke();
      // string
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
      ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(0,22); ctx.stroke();
      ctx.setLineDash([]);
      // arrow ready
      if (this.cooldownTimer > 0) {
        ctx.strokeStyle = w.color; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(22,0); ctx.stroke();
      }
    } else if (w.key === 'LASER') {
      // gun body
      ctx.fillStyle = '#555';
      ctx.fillRect(0,-5,28,10);
      ctx.fillStyle = '#888';
      ctx.fillRect(0,-8,8,16);
      // barrel
      ctx.fillStyle = '#bbb'; ctx.fillRect(24,-3,12,6);
      // energy glow
      ctx.shadowBlur = 8; ctx.shadowColor = w.color;
      ctx.fillStyle = w.color;
      ctx.beginPath(); ctx.arc(30,0,4,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  }
}

// ── PLAYERS ─────────────────────────────────
let p1, p2;

function initPlayers() {
  p1 = new Player(1, canvas.width * .22, '#38d9f5', 1);

  document.getElementById('hitBtn2').textContent = weaponIcon(p2.weapon.key);

function weaponIcon(key) {

}

function updateHpBars() {

  document.getElementById('hpBar2').style.width = (p2.hp / CFG.MAX_HP * 100) + '%';

  document.getElementById('hpBar2').style.opacity = p2.hp < 30 ? '0.7' : '1';

// ── PROJECTILE UPDATE ────────────────────────
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    // off screen
    if (p.x < -50 || p.x > canvas.width + 50 || p.y < 0 || p.y > canvas.height || p.life <= 0) {
      projectiles.splice(i, 1); continue;
    }

    // hit detection
    const target = p.owner === 1 ? p2 : p1;
    if (!target.dead &&
        p.x > target.x && p.x < target.x + target.w &&
        p.y > target.y && p.y < target.y + target.h) {
      const attacker = p.owner === 1 ? p1 : p2;
      attacker.dealDamage(target, p.damage, p.knockback, Math.sign(p.vx));
      // impact particles
      for (let j=0;j<8;j++) spawnParticle(p.x,p.y,p.color,(Math.random()-.5)*6,(Math.random()-.5)*6,3,18);
      projectiles.splice(i, 1);
    }
  }
}

// ── GROUND & BG DRAWING ──────────────────────
function drawBackground() {
  const w = canvas.width, h = canvas.height;

  // sky gradient
  const sky = ctx.createLinearGradient(0,0,0,h);
  sky.addColorStop(0, '#080a12');
  sky.addColorStop(1, '#141830');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,w,h);

  // distant "city" silhouettes
  ctx.fillStyle = '#0d1020';
  const buildH = [120,90,140,80,110,150,100,130,70,160,95,120];
  const bw = w / buildH.length;
  buildH.forEach((bh, i) => {
    ctx.fillRect(i*bw, h - CFG.GROUND_H - bh, bw-2, bh);
  });

  // stars
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  // deterministic pseudo-stars
  for (let i=0;i<60;i++) {
    const sx = (i * 137.508) % w;
    const sy = (i * 83.171)  % (h * .55);
    ctx.fillRect(sx|0, sy|0, 1.5, 1.5);
  }

  // arena platform + glow
  const grd = ctx.createLinearGradient(0, h-CFG.GROUND_H-4, 0, h);
  grd.addColorStop(0, '#2a3060');
  grd.addColorStop(1, '#0d1028');
  ctx.fillStyle = grd;
  ctx.fillRect(0, h-CFG.GROUND_H, w, CFG.GROUND_H);

  // glow line at platform edge
  ctx.strokeStyle = 'rgba(80,120,255,.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, h-CFG.GROUND_H); ctx.lineTo(w, h-CFG.GROUND_H); ctx.stroke();

  // grid lines on floor
  ctx.strokeStyle = 'rgba(80,100,200,.1)'; ctx.lineWidth = 1;
  for (let x=0; x<w; x+=60) {
    ctx.beginPath(); ctx.moveTo(x, h-CFG.GROUND_H); ctx.lineTo(x, h); ctx.stroke();
  }

  // STAS Arena watermark
  ctx.save();
  ctx.globalAlpha = .07;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.min(w*.06,32)}px ${CFG.font || 'sans-serif'}`;
  ctx.textAlign = 'center';
  ctx.fillText('STAS ARENA', w/2, h/2 + 20);
  ctx.restore();
}

function drawProjectiles() {
  projectiles.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.atan2(p.vy, p.vx));
    // glow
    ctx.shadowBlur = 10; ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-p.w/2+2, -2, p.w-4, 4);
    ctx.shadowBlur = 0;
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.vx *= 0.94; p.life--;
  });
  for (let i = particles.length-1; i>=0; i--) if (particles[i].life<=0) particles.splice(i,1);
}

function drawFloatTexts() {
  floatTexts.forEach(t => {
    const alpha = t.life / t.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${18 + (1-alpha)*6}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = t.color;
    ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.lineWidth = 3;
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
    t.y += t.vy; t.life--;
  });
  for (let i = floatTexts.length-1; i>=0; i--) if (floatTexts[i].life<=0) floatTexts.splice(i,1);
}

// ── MAIN LOOP ────────────────────────────────
let lastTime = 0;
function gameLoop(ts) {
  if (!gameActive) return;
  const dt = ts - lastTime || 16;
  lastTime = ts;

  // screen shake
  let sx = 0, sy = 0;
  if (screenShake > 0) {
    sx = (Math.random()-.5) * screenShake;
    sy = (Math.random()-.5) * screenShake;
    screenShake *= 0.82;
    if (screenShake < .5) screenShake = 0;
  }

  ctx.save();
  ctx.translate(sx, sy);

  drawBackground();
  drawProjectiles();
  drawParticles();
  p1.update(dt);
  p2.update(dt);
  p1.draw(ctx);
  p2.draw(ctx);
  drawFloatTexts();

  ctx.restore();

  // online player sync
  if (gameMode === 'online') onlineSyncSend();

  requestAnimationFrame(gameLoop);
}

function startGame(mode) {
  gameMode = mode;
  round = 1;
  document.getElementById('roundDisplay').textContent = `RONDE ${round}`;
  document.getElementById('p1Name').textContent = mode === 'online' ? (onlineUsername || 'KAMU') : 'PLAYER 1';
  document.getElementById('p2Name').textContent = mode === 'online' ? 'LAWAN' : 'PLAYER 2';

  if (mode === 'online') {
    document.getElementById('ctrl-p2').classList.add('hidden');
  } else {
    document.getElementById('ctrl-p2').classList.remove('hidden');
  }

  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('controls').style.display = 'flex';

  startRound();
}

function startRound() {
  resizeCanvas();
  initPlayers();
  startTimer();
  gameActive = true;
  requestAnimationFrame(gameLoop);
}

function startTimer() {
  roundTimer = CFG.ROUND_TIME;
  updateTimerDisplay();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    roundTimer--;
    updateTimerDisplay();
    if (roundTimer <= 0) {
      clearInterval(timerInterval);
      // determine winner by HP
      if (p1.hp > p2.hp) endRound(p1);
      else if (p2.hp > p1.hp) endRound(p2);
      else endRound(null); // draw
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timerDisplay').textContent = String(roundTimer).padStart(2,'0');
  if (roundTimer <= 10) {
    document.getElementById('timerDisplay').style.color = '#f55';
  } else {
    document.getElementById('timerDisplay').style.color = 'var(--c-gold)';
  }
}

function endRound(winner) {
  gameActive = false;
  clearInterval(timerInterval);

  const res = document.getElementById('resultScreen');
  const title = document.getElementById('resultTitle');
  const sub   = document.getElementById('resultSub');

  if (!winner) {
    title.textContent = 'SERI!';
    title.style.color = '#f5c832';
    sub.textContent = 'Tidak ada pemenang ronde ini';
  } else {
    const isP1 = winner.id === 1;
    const wname = gameMode === 'online'
      ? (isP1 ? (onlineUsername || 'KAMU') : 'LAWAN')
      : (isP1 ? 'PLAYER 1' : 'PLAYER 2');
    title.textContent = `${wname} MENANG!`;
    title.style.color = isP1 ? '#38d9f5' : '#f54f38';
    sub.textContent = `HP Tersisa: ${winner.hp} • Senjata: ${winner.weapon.label}`;
  }

  // big explosion at loser position
  const loser = winner ? (winner.id === 1 ? p2 : p1) : p1;
  for (let i=0;i<30;i++) {
    spawnParticle(loser.centerX, loser.centerY, loser.color, (Math.random()-.5)*14, (Math.random()-.5)*14-3, Math.random()*8+3, 60);
  }
  // one last draw frame to show explosion
  ctx.save();
  drawBackground();
  drawParticles();
  p1.draw(ctx); p2.draw(ctx);
  ctx.restore();

  setTimeout(() => {
    res.classList.remove('hidden');
  }, 800);
}

function backToMenu() {
  gameActive = false;
  clearInterval(timerInterval);
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('menuScreen').classList.remove('hidden');

}

// ── VIRTUAL JOYSTICK ─────────────────────────
function setupJoystick(wrapId, knobId, onMove) {
  const wrap = document.getElementById(wrapId);
  const knob = document.getElementById(knobId);
  const R = 55; // max radius
  let active = false, tid = null;
  let bx = 0, by = 0;

  function getRect() { return wrap.getBoundingClientRect(); }

  function start(e) {
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const r = getRect();
    bx = r.left + r.width/2;
    by = r.top  + r.height/2;
    active = true; tid = t.identifier ?? null;
    move(e);
  }
  function move(e) {
    if (!active) return;
    e.preventDefault();
    let t = e.touches ? [...e.touches].find(tt => tt.identifier === tid) || e.touches[0] : e;
    let dx = t.clientX - bx;
    let dy = t.clientY - by;
    const dist = Math.hypot(dx,dy);
    if (dist > R) { dx = dx/dist*R; dy = dy/dist*R; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    onMove(dx/R, dy/R);
  }
  function end(e) {
    e.preventDefault();
    active = false;
    knob.style.transform = 'translate(-50%,-50%)';
    onMove(0, 0);
  }

  wrap.addEventListener('touchstart', start, { passive:false });
  wrap.addEventListener('touchmove',  move,  { passive:false });
  wrap.addEventListener('touchend',   end,   { passive:false });
  wrap.addEventListener('touchcancel',end,   { passive:false });
  wrap.addEventListener('mousedown',  start, { passive:false });
  window.addEventListener('mousemove', e => active && move(e));
  window.addEventListener('mouseup',   e => active && end(e));
}

let p1Input = { dx:0, dy:0 };

// ── ONLINE MULTIPLAYER (WebSocket skeleton) ──
let socket = null;
let onlineUsername = '';
let onlineRoom = '';
let onlinePlayerId = null; // 1 or 2

document.getElementById('btnJoin').addEventListener('click', () => {
  const room = document.getElementById('roomInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  if (!room || !name) {
    document.getElementById('lobbyStatus').textContent = '⚠️ Isi nama room & username dulu!';
    return;
  }
  onlineUsername = name;
  onlineRoom     = room;
  connectOnline(room, name);
});

function connectOnline(room, name) {
  document.getElementById('lobbyStatus').textContent = '⏳ Menghubungkan ke server...';

  // Dynamically load Socket.IO client
  if (!window.io) {
    const s = document.createElement('script');
    s.src = '/socket.io/socket.io.js';
    s.onerror = () => {
      document.getElementById('lobbyStatus').textContent = '❌ Server offline. Gunakan Mode 1HP dulu.';
    };
    s.onload = () => initSocket(room, name);
    document.head.appendChild(s);
  } else {
    initSocket(room, name);
  }
}

function initSocket(room, name) {
  try {
    socket = io({ transports:['websocket'] });

    socket.on('connect', () => {
      document.getElementById('lobbyStatus').textContent = '✅ Terhubung! Bergabung room...';
      socket.emit('join_room', { room, name });
    });

    socket.on('room_joined', data => {
      onlinePlayerId = data.player_id; // 1 or 2
      document.getElementById('lobbyStatus').textContent = `Kamu Player ${onlinePlayerId}. Menunggu lawan...`;
    });

    socket.on('game_start', data => {
      document.getElementById('p2Name').textContent = data.opponent_name || 'LAWAN';
      startGame('online');
    });

    socket.on('opponent_state', data => {
      if (!gameActive) return;
      // Apply opponent state to p2
      if (onlinePlayerId === 1) {
        p2.x  = canvas.width - data.x_pct * canvas.width - p2.w;
        p2.y  = data.y_pct * canvas.height;
        p2.vx = -data.vx;
        p2.facing = -data.facing;
        // if opponent attacked, register hit
        if (data.attack) {
          const hitData = data.attack;
          if (hitData.type === 'melee') {
            if (hitData.hit) p2.dealDamage(p1, hitData.damage, hitData.knockback, -1);
          }
        }
      }
    });

    socket.on('opponent_disconnect', () => {
      if (gameActive) endRound(onlinePlayerId === 1 ? p1 : p2);
    });

    socket.on('connect_error', () => {
      document.getElementById('lobbyStatus').textContent = '❌ Gagal terhubung ke server.';
    });

  } catch(e) {
    document.getElementById('lobbyStatus').textContent = '❌ Socket.IO tidak tersedia.';
  }
}

function onlineSyncSend() {
  if (!socket || !gameActive) return;
  const me = onlinePlayerId === 1 ? p1 : p2;
  socket.emit('player_state', {
    room: onlineRoom,
    x_pct: me.x / canvas.width,
    y_pct: me.y / canvas.height,
    vx: me.vx, vy: me.vy,
    facing: me.facing,
    hp: me.hp,
  });
}
