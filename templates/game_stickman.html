<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman War 2D — STAS Arena</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --c-bg: #0a0c12; --c-arena: #111520; --c-p1: #38d9f5; --c-p2: #f54f38;
            --c-gold: #f5c832; --c-ui: rgba(255,255,255,0.08); --c-uib: rgba(255,255,255,0.18);
            --font: 'Segoe UI', system-ui, sans-serif;
        }
        html, body {
            width: 100%; height: 100%; background: var(--c-bg); overflow: hidden;
            font-family: var(--font); color: #fff; touch-action: none; user-select: none;
        }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: var(--c-bg); transition: opacity .35s ease; }
        .screen.hidden { opacity: 0; pointer-events: none; }
        #hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 5; pointer-events: none; }
        .hud-player { display: flex; flex-direction: column; gap: 4px; width: 35%; }
        .hud-player.p2 { align-items: flex-end; }
        .hud-name { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .hud-name.p1c { color: var(--c-p1); } .hud-name.p2c { color: var(--c-p2); }
        .hud-weapon { font-size: 11px; opacity: 0.7; font-weight: bold; }
        .hp-bar-bg { height: 12px; border-radius: 6px; background: rgba(255,255,255,.1); overflow: hidden; width: 100%; border: 1px solid rgba(255,255,255,0.2); }
        .hp-bar-fill { height: 100%; width: 100%; transition: width .1s ease-out; }
        .hp-bar-fill.p1f { background: linear-gradient(90deg, #0af, var(--c-p1)); }
        .hp-bar-fill.p2f { background: linear-gradient(90deg, var(--c-p2), #f80); }
        .hud-center { display: flex; flex-direction: column; align-items: center; }
        #timerDisplay { font-size: 26px; font-weight: 900; color: var(--c-gold); }
        #roundDisplay { font-size: 10px; opacity: .5; letter-spacing: 2px; }
        #gameCanvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
        #controls { position: fixed; bottom: 0; left: 0; right: 0; height: 160px; z-index: 6; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 30px 30px; pointer-events: none; }
        .ctrl-side { display: flex; gap: 20px; align-items: flex-end; pointer-events: all; }
        .ctrl-side.right { flex-direction: row-reverse; }
        .joystick-wrap { position: relative; width: 100px; height: 100px; }
        .joystick-base { position: absolute; inset: 0; border-radius: 50%; background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.15); }
        .joystick-knob { position: absolute; width: 40px; height: 40px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .joystick-knob.p1k { background: radial-gradient(circle at 35% 35%, #7ef, var(--c-p1)); }
        .joystick-knob.p2k { background: radial-gradient(circle at 35% 35%, #fbb, var(--c-p2)); }
        .hit-btn { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; font-size: 28px; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,.5); }
        .hit-btn:active { transform: scale(.9); }
        .hit-btn.p1h { background: radial-gradient(circle at 35% 35%, #aff, var(--c-p1)); color: #003; }
        .hit-btn.p2h { background: radial-gradient(circle at 35% 35%, #fcc, var(--c-p2)); color: #300; }
        .btn { padding: 12px 30px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-gold { background: var(--c-gold); color: #111; }
        .btn-ghost { background: var(--c-ui); border: 1px solid var(--c-uib); color: #fff; margin-left: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- DATA PASSING BERKAS DARI ROUTE FLASK -->
    <script>
        window.STAS_GAME_CFG = {
            mode: "{{ mode }}",
            room: "{{ room }}",
            username: "{{ username }}"
        };
    </script>

    <!-- HUD AREA OVERLAY -->
    <div id="hud">
        <div class="hud-player">
            <div class="hud-name p1c" id="p1Name">PLAYER 1</div>
            <div class="hud-weapon" id="p1Weapon">—</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill p1f" id="hpBar1"></div></div>
        </div>
        <div class="hud-center">
            <div id="timerDisplay">99</div>
            <div id="roundDisplay">ARENA LAGA</div>
        </div>
        <div class="hud-player p2">
            <div class="hud-name p2c" id="p2Name">PLAYER 2</div>
            <div class="hud-weapon" id="p2Weapon">—</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill p2f" id="hpBar2"></div></div>
        </div>
    </div>

    <!-- CANVAS UTAMA CORE GAME -->
    <canvas id="gameCanvas"></canvas>

    <!-- EMERGENCY RESULT MODAL POPUP SCREEN -->
    <div id="resultScreen" class="screen hidden">
        <h1 id="resultTitle" style="font-size: 36px; margin-bottom: 10px;">PLAYER 1 WIN!</h1>
        <p id="resultSub" style="margin-bottom: 25px; color: #aaa;">Ronde Pertempuran Berakhir</p>
        <div>
            <button class="btn btn-gold" onclick="window.location.reload()">Tanding Ulang</button>
            <a href="/games" class="btn btn-ghost">Menu Utama</a>
        </div>
    </div>

    <!-- DOUBLE JOYSTICK INPUT INTERFACE CONTROLS -->
    <div id="controls">
        <div class="ctrl-side left" id="ctrl-p1">
            <div class="joystick-wrap" id="js1">
                <div class="joystick-base"></div>
                <div class="joystick-knob p1k" id="jk1"></div>
            </div>
            <button class="hit-btn p1h" id="hitBtn1">⚔</button>
        </div>

        <div class="ctrl-side right" id="ctrl-p2">
            <div class="joystick-wrap" id="js2">
                <div class="joystick-base"></div>
                <div class="joystick-knob p2k" id="jk2"></div>
            </div>
            <button class="hit-btn p2h" id="hitBtn2">⚔</button>
        </div>
    </div>

    <!-- IMPORT SOCKET INTERACTION CLIENT & MODUL LOGIC TERPISAH -->
    <script src="https://cdn.socketio.org/4.5.4/socketio.min.js"></script>
    <script src="/static/js/stickman_engine.js"></script>
    <script src="/static/js/stickman_network.js"></script>
</body>
</html>
