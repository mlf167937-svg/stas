<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>STAS Arena - Stickman War 2D</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    touch-action: none;
    font-family: Arial;
}

#gameCanvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* JOYSTICK */
.joystick {
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
}

.stick {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    left: 40px;
    top: 40px;
}

#joyL { bottom: 30px; left: 30px; }
#joyR { bottom: 30px; right: 30px; }

#hit1, #hit2 {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,0,0,0.3);
    border: 2px solid rgba(255,0,0,0.5);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    user-select: none;
}

#hit1 { bottom: 200px; left: 60px; }
#hit2 { bottom: 200px; right: 60px; }
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="joyL" class="joystick"><div class="stick"></div></div>
<div id="joyR" class="joystick"><div class="stick"></div></div>

<div id="hit1">HIT</div>
<div id="hit2">HIT</div>

<script>
const ONLINE_MODE = false; // toggle multiplayer mode

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

if(ONLINE_MODE){
    document.getElementById("joyR").style.display = "none";
    document.getElementById("hit2").style.display = "none";
}

/* ===== WEAPONS ===== */
const WEAPONS = ["katana","bow","mace","laser"];

function randomWeapon(){
    return WEAPONS[Math.floor(Math.random()*WEAPONS.length)];
}

/* ===== PLAYER ===== */
class Player {
    constructor(x,y,color){
        this.x=x;
        this.y=y;
        this.vx=0;
        this.vy=0;
        this.hp=100;
        this.color=color;
        this.weapon=randomWeapon();
        this.cooldown=0;
        this.facing=1;
        this.hitAnim=0;
    }

    update(){
        this.x += this.vx;
        this.y += this.vy;

        this.x = Math.max(20, Math.min(canvas.width-20, this.x));
        this.y = Math.max(20, Math.min(canvas.height-20, this.y));

        if(this.cooldown>0) this.cooldown--;
        if(this.hitAnim>0) this.hitAnim--;
    }

    draw(){
        ctx.save();
        ctx.translate(this.x,this.y);

        // body
        ctx.strokeStyle=this.color;
        ctx.lineWidth=3;

        // head
        ctx.beginPath();
        ctx.arc(0,-20,10,0,Math.PI*2);
        ctx.stroke();

        // body line
        ctx.beginPath();
        ctx.moveTo(0,-10);
        ctx.lineTo(0,20);
        ctx.stroke();

        // legs animation
        ctx.beginPath();
        ctx.moveTo(0,20);
        ctx.lineTo(-10,30+Math.sin(Date.now()/100)*5);
        ctx.moveTo(0,20);
        ctx.lineTo(10,30-Math.sin(Date.now()/100)*5);
        ctx.stroke();

        // weapon
        this.drawWeapon();

        ctx.restore();
    }

    drawWeapon(){
        ctx.strokeStyle="white";
        ctx.fillStyle="white";

        if(this.weapon==="katana"){
            ctx.beginPath();
            ctx.moveTo(5,0);
            ctx.lineTo(25,-10);
            ctx.stroke();
        }

        if(this.weapon==="bow"){
            ctx.beginPath();
            ctx.arc(10,0,10,Math.PI/2,-Math.PI/2);
            ctx.stroke();
        }

        if(this.weapon==="mace"){
            ctx.beginPath();
            ctx.arc(15,0,8,0,Math.PI*2);
            ctx.fill();
        }

        if(this.weapon==="laser"){
            ctx.fillRect(10,-5,10,3);
        }
    }

    attack(){
        if(this.cooldown>0) return;

        this.cooldown=30;

        if(this.weapon==="katana"){
            this.hitAnim=10;
            bullets.push(new Bullet(this.x,this.y,-this.facing*4,0,10,"melee"));
        }

        if(this.weapon==="bow"){
            bullets.push(new Bullet(this.x,this.y,this.facing*7,0,15,"arrow"));
        }

        if(this.weapon==="mace"){
            this.hitAnim=15;
            bullets.push(new Bullet(this.x,this.y,this.facing*3,0,25,"heavy"));
        }

        if(this.weapon==="laser"){
            bullets.push(new Bullet(this.x,this.y,this.facing*10,0,5,"laser"));
            bullets.push(new Bullet(this.x,this.y,this.facing*10,2,5,"laser"));
        }
    }
}

/* ===== BULLET ===== */
class Bullet {
    constructor(x,y,vx,vy,damage,type){
        this.x=x;
        this.y=y;
        this.vx=vx;
        this.vy=vy;
        this.damage=damage;
        this.type=type;
        this.life=120;
    }

    update(){
        this.x+=this.vx;
        this.y+=this.vy;
        this.life--;
    }

    draw(){
        ctx.fillStyle="yellow";
        if(this.type==="laser") ctx.fillStyle="cyan";
        if(this.type==="heavy") ctx.fillStyle="orange";

        ctx.beginPath();
        ctx.arc(this.x,this.y,3,0,Math.PI*2);
        ctx.fill();
    }
}

/* ===== GAME STATE ===== */
const p1 = new Player(100,300,"red");
const p2 = new Player(500,300,"blue");

const bullets=[];
const dmgTexts=[];
let shake=0;

/* ===== DAMAGE TEXT ===== */
function addDamage(x,y,val){
    dmgTexts.push({x,y,val,life:30});
}

/* ===== COLLISION ===== */
function hitTest(b,p){
    return Math.abs(b.x-p.x)<15 && Math.abs(b.y-p.y)<25;
}

/* ===== JOYSTICK ===== */
let joyL={x:0,y:0};
let joyR={x:0,y:0};

function bindJoystick(id,store){
    const el=document.getElementById(id);
    let active=false;

    el.addEventListener("touchstart",e=>{
        active=true;
    });

    el.addEventListener("touchmove",e=>{
        if(!active) return;
        const t=e.touches[0];
        store.x=(t.clientX-window.innerWidth/2)/50;
        store.y=(t.clientY-window.innerHeight/2)/50;
    });

    el.addEventListener("touchend",()=>{
        active=false;
        store.x=0; store.y=0;
    });
}

bindJoystick("joyL",joyL);
bindJoystick("joyR",joyR);

/* HIT BUTTON */
document.getElementById("hit1").onclick=()=>p1.attack();
document.getElementById("hit2").onclick=()=>p2.attack();

/* ===== UPDATE LOOP ===== */
function update(){
    p1.vx=joyL.x;
    p1.vy=joyL.y;

    if(!ONLINE_MODE){
        p2.vx=joyR.x;
        p2.vy=joyR.y;
    }

    p1.update();
    p2.update();

    bullets.forEach((b,i)=>{
        b.update();

        if(hitTest(b,p1) && b!==p1){
            p1.hp-=b.damage;
            addDamage(p1.x,p1.y,b.damage);
            shake=10;
            bullets.splice(i,1);
        }

        if(hitTest(b,p2) && b!==p2){
            p2.hp-=b.damage;
            addDamage(p2.x,p2.y,b.damage);
            shake=10;
            bullets.splice(i,1);
        }

        if(b.life<=0) bullets.splice(i,1);
    });

    dmgTexts.forEach(t=>t.life--);
}

/* ===== DRAW ===== */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(shake>0){
        ctx.save();
        ctx.translate(Math.random()*shake,Math.random()*shake);
        shake--;
    }

    p1.draw();
    p2.draw();

    bullets.forEach(b=>b.draw());

    dmgTexts.forEach(t=>{
        ctx.fillStyle="white";
        ctx.font="16px Arial";
        ctx.fillText("-"+t.val,t.x,t.y-t.life);
    });

    if(shake>0) ctx.restore();

    // HP BAR
    ctx.fillStyle="red";
    ctx.fillRect(20,20,p1.hp*2,10);
    ctx.fillRect(canvas.width-220,20,p2.hp*2,10);
}

/* ===== LOOP ===== */
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
