<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Fight + Restart</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle at top,#1b2a4a,#070b18);
  font-family:Arial;
}

/* CANVAS */
canvas{
  position:absolute;
  top:0;
  left:0;
}

/* UI */
#ui,#enemyUI{
  position:absolute;
  top:10px;
  color:#a9d6ff;
  font-weight:bold;
  text-shadow:0 0 8px #4aa3ff;
  z-index:9999;
}
#ui{left:10px;}
#enemyUI{right:10px;}

.bar{
  width:140px;
  height:10px;
  background:#0b1a33;
  border:1px solid #3b82f6;
}
#hp{background:#38bdf8;height:100%;}
#ehp{background:#60a5fa;height:100%;}

/* JOYSTICK */
#joystick{
  position:absolute;
  bottom:50px;
  left:40px;
  width:90px;
  height:90px;
  border-radius:12px;
  background:rgba(59,130,246,0.15);
  border:1px solid #3b82f6;
  z-index:9999;
}

.stick{
  width:30px;
  height:30px;
  background:#38bdf8;
  border-radius:6px;
  position:absolute;
  left:30px;
  top:30px;
}

/* HIT */
#hitBtn{
  position:absolute;
  bottom:160px;
  right:40px;
  width:90px;
  height:40px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
  z-index:9999;
}

/* MINIMAP */
#minimap{
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:45px;
  background:rgba(3,7,18,0.7);
  border:1px solid #3b82f6;
  z-index:99999;
}

/* GAME OVER */
#gameOver{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:999999;
}

#restartBtn{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="ui">HP<div class="bar"><div id="hp" style="width:100%"></div></div></div>
<div id="enemyUI">ENEMY<div class="bar"><div id="ehp" style="width:100%"></div></div></div>

<div id="joystick"><div class="stick" id="stick"></div></div>
<button id="hitBtn">HIT ⚔</button>

<canvas id="game"></canvas>
<canvas id="minimap"></canvas>

<!-- GAME OVER -->
<div id="gameOver">
<h1 id="resultText">GAME OVER</h1>
<button id="restartBtn">RESTART</button>
</div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

const mini=document.getElementById("minimap");
const mctx=mini.getContext("2d");

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

/* GAME STATE */
let player,enemy,move={x:0,y:0};
let gameOver=false;

function reset(){
  player={x:200,y:200,hp:100};
  enemy={x:500,y:300,hp:100};
  gameOver=false;
  document.getElementById("gameOver").style.display="none";
}
reset();

/* DRAW STICKMAN */
function drawStickman(x,y,color){
  ctx.strokeStyle=color;
  ctx.lineWidth=2;

  // head
  ctx.beginPath();
  ctx.arc(x,y-15,6,0,Math.PI*2);
  ctx.stroke();

  // body
  ctx.beginPath();
  ctx.moveTo(x,y-9);
  ctx.lineTo(x,y+10);
  ctx.stroke();

  // arms
  ctx.beginPath();
  ctx.moveTo(x-10,y);
  ctx.lineTo(x+10,y);
  ctx.stroke();

  // legs
  ctx.beginPath();
  ctx.moveTo(x,y+10);
  ctx.lineTo(x-8,y+25);
  ctx.moveTo(x,y+10);
  ctx.lineTo(x+8,y+25);
  ctx.stroke();
}

/* HIT */
function hit(){
  if(gameOver) return;

  let dx=enemy.x-player.x;
  let dy=enemy.y-player.y;

  if(Math.hypot(dx,dy)<70){
    enemy.hp-=10;
  }
}

/* UPDATE */
function update(){
  if(gameOver) return;

  player.x += move.x*4;
  player.y += move.y*4;

  let dx=player.x-enemy.x;
  let dy=player.y-enemy.y;

  enemy.x += dx*0.01;
  enemy.y += dy*0.01;

  if(Math.hypot(dx,dy)<45){
    player.hp-=0.2;
  }

  /* clamp */
  player.x=Math.max(10,Math.min(c.width-10,player.x));
  player.y=Math.max(10,Math.min(c.height-10,player.y));

  enemy.x=Math.max(10,Math.min(c.width-10,enemy.x));
  enemy.y=Math.max(10,Math.min(c.height-10,enemy.y));

  player.hp=Math.max(0,player.hp);
  enemy.hp=Math.max(0,enemy.hp);

  document.getElementById("hp").style.width=player.hp+"%";
  document.getElementById("ehp").style.width=enemy.hp+"%";

  /* GAME OVER CHECK */
  if(player.hp<=0 || enemy.hp<=0){
    gameOver=true;
    document.getElementById("gameOver").style.display="flex";

    if(player.hp<=0){
      document.getElementById("resultText").innerText="YOU LOSE";
    }else{
      document.getElementById("resultText").innerText="YOU WIN";
    }
  }
}

/* LOOP */
function loop(){
  update();

  ctx.clearRect(0,0,c.width,c.height);
  mctx.clearRect(0,0,mini.width,mini.height);

  drawStickman(player.x,player.y,"#38bdf8");
  drawStickman(enemy.x,enemy.y,"#60a5fa");

  mctx.fillStyle="#38bdf8";
  mctx.fillRect(player.x/10,player.y/10,2,2);

  mctx.fillStyle="#60a5fa";
  mctx.fillRect(enemy.x/10,enemy.y/10,2,2);

  requestAnimationFrame(loop);
}
loop();

/* JOYSTICK */
const joy=document.getElementById("joystick");
const stick=document.getElementById("stick");

let drag=false;

joy.addEventListener("touchstart",()=>drag=true);
joy.addEventListener("touchend",()=>{
  drag=false;
  move={x:0,y:0};
  stick.style.left="30px";
  stick.style.top="30px";
});

joy.addEventListener("touchmove",e=>{
  if(!drag) return;

  let t=e.targetTouches[0];
  let r=joy.getBoundingClientRect();

  let dx=t.clientX-(r.left+r.width/2);
  let dy=t.clientY-(r.top+r.height/2);

  move.x=Math.max(-1,Math.min(1,dx/30));
  move.y=Math.max(-1,Math.min(1,dy/30));

  stick.style.left=(30+move.x*20)+"px";
  stick.style.top=(30+move.y*20)+"px";
});

/* HIT */
document.getElementById("hitBtn").addEventListener("click",hit);
document.getElementById("hitBtn").addEventListener("touchstart",hit);

/* RESTART */
document.getElementById("restartBtn").addEventListener("click",reset);
</script>

</body>
</html>
