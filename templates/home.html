<!DOCTYPE html>
<html>
<head>
  <title>STAS Community</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="topbar">
  <h3>STAS COMMUNITY</h3>
  <a href="/logout">Keluar</a>
</div>

<!-- GENERAL -->
<div id="general" class="page active">
  <h2>General Community</h2>
  <p>Selamat datang {{ user }} di STAS</p>

  <hr>

  <p>📢 Info komunitas akan muncul di sini</p>
</div>

<!-- SEARCH -->
<div id="search" class="page">
  <h2>Search Member</h2>
  <input placeholder="Cari user komunitas...">
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <h2>Profile</h2>
  <p>User: {{ user }}</p>
  <p>Community: STAS</p>
</div>

<!-- BOTTOM NAV (WA STYLE) -->
<div class="bottomnav">

  <button onclick="showPage('general')">General</button>
  <button onclick="showPage('search')">Search</button>
  <button onclick="showPage('profile')">Profile</button>

</div>

<script src="/static/app.js"></script>
</body>
</html>
