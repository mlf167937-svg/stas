<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAS Community - Admin</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-transition">
    <header class="main-header">
        <h1>STAS COMMUNITY</h1>
        <p class="subtitle">Sang Tuan Alhidayah Sutam</p>
        <div class="search-bar-container" onclick="location.href='/search'">
            <input type="text" class="wa-search-bar" placeholder="Cari anggota, tanya komunitas, atau search AI..." readonly>
        </div>
    </header>

    <main class="content-area">
        <div class="admin-panel">
            <h2>Admin Dashboard</h2>
            <p class="subtitle" style="margin-bottom: 20px;">Manage Community Members</p>
            
            <div class="admin-controls">
                <button class="admin-btn add-btn">+ Tambah User</button>
            </div>

            <div class="admin-list">
                {% for m in members %}
                <div class="admin-list-item">
                    <span class="admin-uid">{{ m.id }}</span>
                    <span class="admin-uname">{{ m.nama }}</span>
                    <button class="admin-btn del-btn">Hapus</button>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="/home" class="nav-item">GENERAL</a>
        <a href="/games" class="nav-item">GAME</a> <a href="/ai" class="nav-item">AI STAS</a>
        <a href="/admin" class="nav-item">ADMIN UI</a>
    </nav>

    <script src="/static/app.js"></script>
</body>
</html>
