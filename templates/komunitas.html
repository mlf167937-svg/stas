<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAS — Komunitas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <span class="logo-s">S</span><span class="logo-t">T</span><span class="logo-as">AS</span>
    &nbsp;Web
  </div>
  <div class="nav-links">
    <a href="{{ url_for('index') }}">Beranda</a>
    <a href="{{ url_for('komunitas') }}" class="active">Komunitas</a>
    <a href="{{ url_for('album') }}">Album</a>
    <a href="{{ url_for('games') }}">Games</a>
  </div>
  <div class="nav-user">
    <span class="greet">Halo, <strong>{{ session.fullname or session.member }}</strong></span>
    <a href="{{ url_for('logout') }}" class="btn-logout">Keluar</a>
  </div>
</nav>

<div class="page-wrapper" style="padding-top:1.25rem; padding-bottom:1.25rem;">
  <div class="chat-container-grid">

    <div class="chat-layout">
      <div class="chat-header">
        <div class="dot"></div>
        <span style="font-weight:600;">💬 Chat Komunitas STAS</span>
        <span style="font-size:.8rem; color:var(--text-muted); margin-left:auto;" id="online-count">— member online</span>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div style="text-align:center; padding:2rem; color:var(--text-muted); font-size:.85rem;">
          ✨ Selamat datang di Komunitas STAS!<br>
          <span style="font-size:.78rem;">Pesan tidak tersimpan saat server restart.</span>
        </div>
      </div>

      <div class="chat-input-area">
        <input
          type="text" id="chat-input"
          placeholder="Tulis pesan..."
          maxlength="500"
          autocomplete="off"
        />
        <button class="btn-send" id="chat-send">Kirim ➤</button>
      </div>
    </div>

    <div class="ai-panel-wrapper">

      <div class="chat-layout ai-chat-layout">
        <div class="chat-header" style="background: rgba(191,95,255,.06);">
          <span style="color:var(--purple-neon);">🤖</span>
          <span style="font-weight:600; font-size:.9rem;">STAS-AI Assistant</span>
        </div>
        <div class="chat-messages" id="ai-chatbox" style="padding:.85rem;"></div>
        <div class="chat-input-area">
          <input type="text" id="ai-input" placeholder="Tanya AI..." maxlength="200" autocomplete="off" />
          <button class="btn-send" id="ai-send" style="padding:.65rem .8rem;">➤</button>
        </div>
      </div>

      <div class="system-log-panel">
        <div style="font-size:.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.5rem;">
          ⚙ System Log
        </div>
        <div id="ai-log"></div>
      </div>

    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/ai.js') }}"></script>
<script>
  // FIX: Menggunakan logika conditional Jinja yang benar agar ter-render sebagai string JS yang valid
  const ME = {% if session.fullname %}{{ session.fullname | tojson }}{% else %}{{ session.member | tojson }}{% endif %};
  
  const messages  = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');
  const chatSend  = document.getElementById('chat-send');
  let   lastCount = 0;

  // Fungsi render chat ala WhatsApp (Kanan-Kiri + Nama + Jam Akurat)
  function renderMsg(msg) {
    const isOwn = msg.sender === ME;
    const wrap  = document.createElement('div');
    
    // Jika pesan dari kita sendiri, kasih class 'own' biar rata kanan
    wrap.className = 'chat-msg' + (isOwn ? ' own' : '');

    // Format tampilan chat ala WA (Nama di atas teks, Jam di bawah/samping)
    wrap.innerHTML = `
      <div class="chat-bubble-content">
        <div class="chat-bubble-text">
          ${!isOwn ? `<div class="chat-bubble-sender-name" style="font-weight: 700; font-size: 0.78rem; color: var(--purple-neon); margin-bottom: 2px;">${msg.sender}</div>` : ''}
          
          <div class="chat-text-content" style="font-size: 0.9rem; line-height: 1.4; word-break: break-word;">${escHtml(msg.text)}</div>
          
          <div class="chat-bubble-time" style="font-size: 0.68rem; color: var(--text-muted); text-align: right; margin-top: 4px; display: block;">${msg.ts || '00:00'}</div>
        </div>
      </div>
    `;
    
    messages.appendChild(wrap);
    // Auto-scroll ke bawah setiap ada pesan baru
    messages.scrollTop = messages.scrollHeight;
  }

  // Security check biar gak bisa di-inject HTML (XSS Protection)
  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Ambil data chat dari Backend Python
  async function fetchChat() {
    try {
      const res  = await fetch('/api/chat');
      const data = await res.json();
      if (data.length !== lastCount) {
        // Ambil pesan yang benar-benar baru aja
        const newMsgs = data.slice(lastCount);
        newMsgs.forEach(renderMsg);
        lastCount = data.length;
        
        // Indikator Online internal dummy biar keliatan idup komunitasnya
        document.getElementById('online-count').textContent =
          `${Math.max(1, Math.floor(Math.random()*4)+1)} member online`;
      }
    } catch(e) { console.error("Gagal mengambil chat:", e); }
  }

  // Kirim chat ke database/backend
  async function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    try {
      await fetch('/api/chat', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ text })
      });
      await fetchChat(); // Langsung refresh chat setelah kirim
    } catch(e) { console.error("Gagal mengirim chat:", e); }
  }

  // Event Listener Tombol & Enter
  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

  // Jalankan polling realtime tiap 2 detik
  fetchChat();
  setInterval(fetchChat, 2000);
</script>
</body>
</html>
