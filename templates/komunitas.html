<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAS — Komunitas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="nav-brand">
    <span class="logo-s">S</span><span class="logo-t">T</span><span class="logo-as">AS</span>
    &nbsp;Web
  </div>
  <div class="nav-links">
    <a href="{{ url_for('index') }}">Beranda</a>
    <a href="{{ url_for('komunitas') }}" class="active">Komunitas</a>
    <a href="{{ url_for('album') }}">Album</a>
    <a href="{{ url_for('games') }}">Games</a>
  </div>
  <div class="nav-user">
    <span class="greet">Halo, <strong>{{ session.fullname or session.member }}</strong></span>
    <a href="{{ url_for('logout') }}" class="btn-logout">Keluar</a>
  </div>
</nav>

<!-- ── Chat Layout ── -->
<div class="page-wrapper" style="padding-top:1.25rem; padding-bottom:1.25rem;">
  <div style="display:grid; grid-template-columns:1fr 300px; gap:1.25rem; height:calc(100vh - 62px - 2.5rem);">

    <!-- Chat Utama -->
    <div class="chat-layout">
      <div class="chat-header">
        <div class="dot"></div>
        <span style="font-weight:600;">💬 Chat Komunitas STAS</span>
        <span style="font-size:.8rem; color:var(--text-muted); margin-left:auto;" id="online-count">— member online</span>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div style="text-align:center; padding:2rem; color:var(--text-muted); font-size:.85rem;">
          ✨ Selamat datang di Komunitas STAS!<br>
          <span style="font-size:.78rem;">Pesan tidak tersimpan saat server restart.</span>
        </div>
      </div>

      <div class="chat-input-area">
        <input
          type="text" id="chat-input"
          placeholder="Tulis pesan..."
          maxlength="500"
          autocomplete="off"
        />
        <button class="btn-send" id="chat-send">Kirim ➤</button>
      </div>
    </div>

    <!-- Panel AI Asisten -->
    <div style="display:flex; flex-direction:column; gap:1rem; overflow:hidden;">

      <!-- AI Chat -->
      <div class="chat-layout" style="flex:1; min-height:0;">
        <div class="chat-header" style="background: rgba(191,95,255,.06);">
          <span style="color:var(--purple-neon);">🤖</span>
          <span style="font-weight:600; font-size:.9rem;">STAS-AI Assistant</span>
        </div>
        <div class="chat-messages" id="ai-chatbox" style="padding:.85rem;"></div>
        <div class="chat-input-area">
          <input type="text" id="ai-input" placeholder="Tanya AI..." maxlength="200" autocomplete="off" />
          <button class="btn-send" id="ai-send" style="padding:.65rem .8rem;">➤</button>
        </div>
      </div>

      <!-- System Log -->
      <div style="
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: .85rem;
        height: 160px;
        overflow-y: auto;
        flex-shrink: 0;
      ">
        <div style="font-size:.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.5rem;">
          ⚙ System Log
        </div>
        <div id="ai-log"></div>
      </div>

    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/ai.js') }}"></script>
<script>
  const ME       = {{ session.fullname | tojson }};
  const messages  = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');
  const chatSend  = document.getElementById('chat-send');
  let   lastCount = 0;

  function renderMsg(msg) {
    const isOwn = msg.sender === ME;
    const wrap  = document.createElement('div');
    wrap.className = 'chat-msg' + (isOwn ? ' own' : '');

    const initial = msg.sender ? msg.sender.charAt(0).toUpperCase() : '?';
    wrap.innerHTML = `
      <div class="chat-bubble-avatar">${initial}</div>
      <div class="chat-bubble-content">
        <div class="chat-bubble-meta">${isOwn ? '' : msg.sender + ' · '}${msg.ts}</div>
        <div class="chat-bubble-text">${escHtml(msg.text)}</div>
      </div>
    `;
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function fetchChat() {
    try {
      const res  = await fetch('/api/chat');
      const data = await res.json();
      if (data.length !== lastCount) {
        // Hanya render yang baru
        const newMsgs = data.slice(lastCount);
        newMsgs.forEach(renderMsg);
        lastCount = data.length;
        document.getElementById('online-count').textContent =
          `${Math.max(1, Math.floor(Math.random()*4)+1)} member online`;
      }
    } catch(e) {}
  }

  async function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    try {
      await fetch('/api/chat', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ text })
      });
      await fetchChat();
    } catch(e) {}
  }

  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

  // Poll setiap 2 detik
  fetchChat();
  setInterval(fetchChat, 2000);
</script>
</body>
</html>
