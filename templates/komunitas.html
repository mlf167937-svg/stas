<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAS — Komunitas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    /* Tambahan layout styling khusus perbaikan komonitas */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 1rem;
      height: calc(100vh - 80px);
      max-height: 800px;
    }
    .chat-layout-clean {
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
      height: 100%;
    }
    .msg-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .mention-tag {
      color: #00ffff;
      font-weight: bold;
      background: rgba(0, 255, 255, 0.1);
      padding: 1px 4px;
      border-radius: 4px;
    }
    .reaction-bar {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .btn-react {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2px 6px;
      font-size: 0.7rem;
      cursor: pointer;
      color: var(--text-main);
    }
    .btn-react:hover { background: rgba(255,255,255,0.15); }
    .bubble-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .quick-emojis span {
      cursor: pointer;
      margin-right: 4px;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .quick-emojis span:hover { transform: scale(1.3); }
    .mention-suggest {
      position: absolute;
      bottom: 70px;
      left: 15px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      max-height: 150px;
      overflow-y: auto;
      z-index: 999;
      display: none;
      width: 200px;
    }
    .mention-item {
      padding: 0.5rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .mention-item:hover { background: rgba(255,255,255,0.1); color: var(--purple-neon); }
    .media-preview img, .media-preview video {
      max-width: 250px;
      border-radius: 8px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand"><span class="logo-s">STAS</span> Web</div>
  <div class="nav-links">
    <a href="{{ url_for('index') }}">Beranda</a>
    <a href="{{ url_for('komunitas') }}" class="active">Komunitas</a>
    <a href="{{ url_for('album') }}">Album</a>
    <a href="{{ url_for('games') }}">Games</a>
  </div>
  <div class="nav-user">
    <span class="greet">Halo, <strong>{{ session.fullname or session.member }}</strong></span>
    <a href="{{ url_for('logout') }}" class="btn-logout">Keluar</a>
  </div>
</nav>

<div class="page-wrapper" style="padding-top:1rem; padding-bottom:1rem;">
  <div class="grid-container">

    <div class="chat-layout-clean">
      <div class="chat-header" style="position:relative;">
        <div class="dot"></div>
        <span style="font-weight:600;">💬 Ruang Obrolan STAS</span>
        <span style="font-size:.8rem; color:var(--text-muted); margin-left:auto;" id="online-count">1 member online</span>
      </div>

      <div class="msg-list" id="chat-messages"></div>

      <div class="mention-suggest" id="mention-box"></div>

      {% if session.is_guest %}
        <div style="padding: 1rem; background: rgba(255, 65, 54, 0.05); border-top: 1px solid rgba(255, 65, 54, 0.15); text-align: center; color: #ff4136; font-size: 0.85rem;">
          🔒 Fungsi mengetik, kirim media, & react dinonaktifkan untuk akun Tamu.
        </div>
      {% else %}
        <div class="chat-input-area" style="position:relative; gap: 8px; padding: 0.75rem;">
          <button type="button" class="btn-send" style="background:rgba(255,255,255,0.05); padding:0.5rem;" onclick="document.getElementById('file-input').click()">📎</button>
          <input type="file" id="file-input" style="display:none;" accept="image/*,video/*" onchange="uploadMedia(this)" />
          
          <button type="button" id="vn-btn" class="btn-send" style="background:rgba(255,255,255,0.05); padding:0.5rem;">🎙️</button>

          <input type="text" id="chat-input" placeholder="Tulis pesan... gunakan @ untuk tag" maxlength="500" autocomplete="off" style="flex:1;" />
          <button class="btn-send" id="chat-send">Kirim ➤</button>
        </div>
      {% endif %}
    </div>

    <div class="chat-layout-clean">
      <div class="chat-header" style="background: rgba(191,95,255,.06);">
        <span>🤖</span>
        <span style="font-weight:600; font-size:.9rem;">STAS-AI (Asisten Pribadi)</span>
      </div>
      <div class="msg-list" id="ai-chatbox"></div>
      <div class="chat-input-area" style="padding: 0.75rem;">
        <input type="text" id="ai-input" placeholder="Tanya AI Pribadi..." maxlength="200" autocomplete="off" />
        <button class="btn-send" id="ai-send">➤</button>
      </div>
    </div>

  </div>
</div>

<script src="{{ url_for('static', filename='js/ai.js') }}"></script>
<script>
  // Ambil data identitas login dari Flask
  const ME_NAME = {% if session.fullname %}{{ session.fullname | tojson }}{% else %}{{ session.member | tojson }}{% endif %};
  const ME_USER = {{ session.member | tojson }};
  const IS_GUEST = {% if session.is_guest %}true{% else %}false{% endif %};
  
  // Data list member terdaftar untuk sistem autocomplete tag @
  const REGISTERED_MEMBERS = {{ members | tojson }};

  const messagesBox = document.getElementById('chat-messages');
  const chatInput   = document.getElementById('chat-input');
  const chatSend    = document.getElementById('chat-send');
  const mentionBox  = document.getElementById('mention-box');
  const vnBtn       = document.getElementById('vn-btn');

  let mediaRecorder;
  let audioChunks = [];
  let isRecording = false;

  // ─── PARSING FILTER TEKS (Format tag @ menjadi link berwarna neon) ──────────
  defFilterText = (text) => {
    let html = escHtml(text);
    // Ganti kata @stasai
    html = html.replace(/@stasai/gi, '<span class="mention-tag">@stasai</span>');
    // Ganti data nama member .txt yang terdaftar
    REGISTERED_MEMBERS.forEach(m => {
      let regex = new RegExp(`@${m.username}`, 'gi');
      html = html.replace(regex, `<span class="mention-tag">@${m.username}</span>`);
    });
    return html;
  };

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── RENDER BUBBLE CHAT SYSTEM ──────────────────────────────────────────────
  function renderMsg(msg) {
    const isOwn = msg.username === ME_USER;
    const wrap = document.createElement('div');
    wrap.className = 'chat-msg' + (isOwn ? ' own' : '');
    wrap.setAttribute('data-id', msg.id);

    // Hitung tampilan rekap emoji reaksi
    let reactionHtml = '';
    for (let emo in msg.reactions) {
      if (msg.reactions[emo].length > 0) {
        reactionHtml += `<button class="btn-react" onclick="sendReaction('${msg.id}', '${emo}')">${emo} <sub>${msg.reactions[emo].length}</sub></button>`;
      }
    }

    // Tampilan media jika tipenya bukan teks biasa
    let mediaHtml = '';
    if (msg.type === 'image') {
      mediaHtml = `<div class="media-preview"><img src="${msg.file_url}" alt="Foto" onclick="window.open(this.src)"/></div>`;
    } else if (msg.type === 'video') {
      mediaHtml = `<div class="media-preview"><video src="${msg.file_url}" controls></video></div>`;
    } else if (msg.type === 'audio') {
      mediaHtml = `<div style="margin-top:5px;"><audio src="${msg.file_url}" controls style="max-width:220px;"></audio></div>`;
    }

    // Tombol tong sampah hapus pesan khusus untuk akun admin bernama: rauf
    let deleteBtnHtml = (ME_USER === 'rauf') ? `<span style="cursor:pointer; color:#ff4136; font-size:0.75rem;" onclick="deleteMessage('${msg.id}')">🗑️ Hapus</span>` : '';

    wrap.innerHTML = `
      <div class="chat-bubble-content">
        <div class="chat-bubble-text">
          ${!isOwn ? `<div style="font-weight:700; font-size:0.78rem; color:var(--purple-neon); margin-bottom:2px;">${msg.sender}</div>` : ''}
          <div style="font-size:0.9rem; line-height:1.4; intent: word-break:break-word;">${defFilterText(msg.text)}</div>
          ${mediaHtml}
          
          <div class="bubble-actions">
            <span style="font-size:0.65rem; color:var(--text-muted);">${msg.ts}</span>
            ${deleteBtnHtml}
            
            ${!IS_GUEST ? `
            <div class="quick-emojis" style="display:inline-block; margin-left:8px; opacity:0.6;">
              <span onclick="sendReaction('${msg.id}', '👍')">👍</span>
              <span onclick="sendReaction('${msg.id}', '❤️')">❤️</span>
              <span onclick="sendReaction('${msg.id}', '😂')">😂</span>
            </div>
            ` : ''}
          </div>
          <div class="reaction-bar">${reactionHtml}</div>
        </div>
      </div>
    `;
    messagesBox.appendChild(wrap);
  }

  // ─── FETCH & ENGINE POLLING REALTIME REAL DATA ──────────────────────────────
  async function fetchChat() {
    try {
      const res = await fetch('/api/chat');
      const data = await res.json();
      
      const wasAtBottom = messagesBox.scrollHeight - messagesBox.scrollTop <= messagesBox.clientHeight + 60;
      messagesBox.innerHTML = ''; // Clear anti duplikasi bug gila gedor data lama
      
      data.forEach(renderMsg);
      if (wasAtBottom) { messagesBox.scrollTop = messagesBox.scrollHeight; }
    } catch(e) { console.error(e); }
  }

  // SEND CHAT FUNCTION
  async function sendChat() {
    if(IS_GUEST) return;
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    mentionBox.style.display = 'none';
    try {
      await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, type: 'text' })
      });
      fetchChat();
    } catch(e) { console.error(e); }
  }

  // KASIH REAKSI EMOT
  async function sendReaction(msgId, emoji) {
    if(IS_GUEST) return;
    try {
      await fetch('/api/chat/react', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msg_id: msgId, emoji: emoji })
      });
      fetchChat();
    } catch(e) { console.error(e); }
  }

  // ADMIN ACTION: HAPUS PESAN RAUF
  async function deleteMessage(msgId) {
    if(confirm("Hapus pesan ini permanen dari obrolan STAS?")) {
      try {
        await fetch(`/api/chat/delete/${msgId}`, { method: 'DELETE' });
        fetchChat();
      } catch(e) { console.error(e); }
    }
  }

  // ─── SYSTEM ACTION: UPLOAD FOTO / VIDEO ─────────────────────────────────────
  async function uploadMedia(inputElement) {
    if(IS_GUEST || inputElement.files.length === 0) return;
    const file = inputElement.files[0];
    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/api/chat/upload', { method: 'POST', body: formData });
      const meta = await res.json();
      
      if(meta.file_url) {
        // Post ke chat log setelah file sukses nangkring di database
        await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: `Kirim berkas ${meta.type}`, type: meta.type, file_url: meta.file_url })
        });
        fetchChat();
      }
    } catch(e) { console.error("Upload gagal:", e); }
    inputElement.value = ''; // Reset input
  }

  // ─── FITUR VOICE NOTE AUDIO MIKROFON ────────────────────────────────────────
  if(vnBtn && !IS_GUEST) {
    vnBtn.addEventListener('click', async () => {
      if (!isRecording) {
        // Mulai rekam suara mikrofon device
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('file', new File([audioBlob], "vn.webm", { type: 'audio/webm' }));
            
            vnBtn.style.background = 'rgba(255,255,255,0.05)';
            vnBtn.textContent = '🎙️';
            
            // Kirim ke backend
            const res = await fetch('/api/chat/upload', { method: 'POST', body: formData });
            const meta = await res.json();
            if(meta.file_url) {
              await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: "Voice Note 🎙️", type: 'audio', file_url: meta.file_url })
              });
              fetchChat();
            }
          };
          
          mediaRecorder.start();
          isRecording = true;
          vnBtn.style.background = '#ff4136';
          vnBtn.textContent = '🛑';
        } catch(err) { alert("Akses mic ditolak/gagal!"); }
      } else {
        // Matikan rekaman suara & kirim otomatis
        mediaRecorder.stop();
        isRecording = false;
      }
    });
  }

  // ─── LOGIKA AUTOCOMPLETE DROPDOWN TAG LISTING @ MEMBER ──────────────────────
  if (chatInput && !IS_GUEST) {
    chatInput.addEventListener('input', (e) => {
      const val = e.target.value;
      const atIndex = val.lastIndexOf('@');
      
      if (atIndex !== -1 && atIndex === val.length - 1) {
        // Munculkan menu dropdown sugesti
        mentionBox.innerHTML = '<div class="mention-item" onclick="insertMention(\'stasai\')">🤖 stasai (Group AI)</div>';
        REGISTERED_MEMBERS.forEach(m => {
          mentionBox.innerHTML += `<div class="mention-item" onclick="insertMention('${m.username}')">👤 ${m.username}</div>`;
        });
        mentionBox.style.display = 'block';
      } else if (atIndex === -1 || val.endsWith(' ')) {
        mentionBox.style.display = 'none';
      }
    });
  }

  function insertMention(username) {
    const val = chatInput.value;
    const atIndex = val.lastIndexOf('@');
    chatInput.value = val.substring(0, atIndex) + `@${username} `;
    mentionBox.style.display = 'none';
    chatInput.focus();
  }

  // Event Listener Bind klik kirim normal
  if(chatSend && chatInput) {
    chatSend.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendChat(); });
  }

  // Engine detak start loop
  fetchChat();
  setInterval(fetchChat, 2000);
</script>
</body>
</html>
