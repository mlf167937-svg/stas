<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAS — Komunitas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    /* ─── FLEX LAYOUT VERTIKAL (ATAS - BAWAH) ─── */
    .vertical-layout {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      height: calc(100vh - 90px);
      max-height: 900px;
    }
    .section-komunitas {
      flex: 1.4; /* Chat utama lebih luas */
      display: flex;
      flex-direction: column;
      background: #0b141a; /* Background WA Dark */
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
    }
    .section-ai {
      flex: 0.8; /* Panel AI di bawah lebih ringkas */
      display: flex;
      flex-direction: column;
      background: #111b21;
      border: 1px solid rgba(191,95,255,0.15);
      border-radius: 12px;
      overflow: hidden;
    }

    /* ─── WHATSAPP BUBBLE STYLING ─── */
    .msg-list-wa {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* WA pattern opacity rendah */
      background-alpha: 0.04;
    }
    .wa-bubble-wrap {
      display: flex;
      width: 100%;
      margin-bottom: 2px;
      position: relative;
    }
    .wa-bubble-wrap.own { justify-content: flex-end; }
    
    .wa-bubble {
      max-width: 65%;
      padding: 6px 10px 4px 10px;
      border-radius: 8px;
      position: relative;
      cursor: pointer; /* Menandakan bisa diklik buat emot */
      transition: background 0.2s;
      box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    }
    .wa-bubble-wrap.own .wa-bubble {
      background: #005c4b; /* Hijau WA */
      color: #e9edef;
      border-top-right-radius: 0;
    }
    .wa-bubble-wrap:not(.own) .wa-bubble {
      background: #202c33; /* Abu-abu WA */
      color: #e9edef;
      border-top-left-radius: 0;
    }
    .wa-bubble:hover { filter: brightness(1.1); }

    .wa-meta-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 2px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.5);
      text-align: right;
    }

    .mention-tag {
      color: #53bdeb;
      font-weight: 500;
      background: rgba(83,189,235,0.1);
      padding: 0px 4px;
      border-radius: 4px;
    }

    /* ─── FLOATING REACTION POPUP (KLIK BUBBLE) ─── */
    .reaction-popup {
      position: absolute;
      background: #233138;
      border-radius: 20px;
      padding: 4px 8px;
      display: flex;
      gap: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      z-index: 99;
      top: -35px;
      animation: popIn 0.15s ease-out;
    }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .reaction-popup span { cursor: pointer; font-size: 1.1rem; transition: transform 0.1s; }
    .reaction-popup span:hover { transform: scale(1.3); }

    .badge-reactions {
      display: flex;
      gap: 2px;
      position: absolute;
      bottom: -10px;
      right: 10px;
      background: #202c33;
      border: 1px solid #374248;
      border-radius: 10px;
      padding: 1px 4px;
      font-size: 0.65rem;
    }

    /* ─── MODAL PREVIEW MEDIA SEBELUM KIRIM ─── */
    .wa-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11,20,26,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 2rem;
    }
    .modal-content-box {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .modal-preview-zone img, .modal-preview-zone video {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      object-fit: contain;
    }
    .modal-input-area {
      display: flex;
      background: #2a3942;
      border-radius: 8px;
      padding: 0.5rem;
      gap: 0.5rem;
    }

    /* ─── SLEEK VOICE NOTE AUDIO PLAYER ─── */
    .custom-vn-player {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.15);
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 4px;
    }
    .custom-vn-player audio {
      height: 30px;
      max-width: 180px;
    }

    .mention-suggest {
      position: absolute;
      bottom: 60px;
      left: 50px;
      background: #233138;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      max-height: 140px;
      overflow-y: auto;
      z-index: 999;
      display: none;
      width: 220px;
    }
    .mention-item { padding: 0.5rem; cursor: pointer; font-size: 0.85rem; color: #e9edef; }
    .mention-item:hover { background: #182229; color: #00a884; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand"><span class="logo-s">STAS</span> Web</div>
  <div class="nav-links">
    <a href="{{ url_for('index') }}">Beranda</a>
    <a href="{{ url_for('komunitas') }}" class="active">Komunitas</a>
    <a href="{{ url_for('album') }}">Album</a>
    <a href="{{ url_for('games') }}">Games</a>
  </div>
  <div class="nav-user">
    <span class="greet">Halo, <strong>{{ session.fullname or session.member }}</strong></span>
    <a href="{{ url_for('logout') }}" class="btn-logout">Keluar</a>
  </div>
</nav>

<div class="page-wrapper" style="padding-top:0.75rem; padding-bottom:0.75rem;">
  <div class="vertical-layout">

    <div class="section-komunitas">
      <div class="chat-header">
        <div class="dot"></div>
        <span style="font-weight:600;">💬 Ruang Grup WhatsApp STAS</span>
        <span style="font-size:.8rem; color:var(--text-muted); margin-left:auto;" id="online-count">1 online</span>
      </div>

      <div class="msg-list-wa" id="chat-messages" onclick="closeAllReactionPopups(event)"></div>

      <div class="mention-suggest" id="mention-box"></div>

      {% if session.is_guest %}
        <div style="padding: 0.75rem; background: rgba(255, 65, 54, 0.05); text-align: center; color: #ff4136; font-size: 0.82rem; border-top:1px solid rgba(255,255,255,0.05);">
          🔒 Fungsi mengetik, kirim media, & bereaksi dinonaktifkan untuk akun Tamu.
        </div>
      {% else %}
        <div class="chat-input-area" style="background:#111b21; padding:0.5rem 0.75rem; gap:8px;">
          <button type="button" class="btn-send" style="background:transparent; font-size:1.2rem;" onclick="document.getElementById('file-input').click()">📎</button>
          <input type="file" id="file-input" style="display:none;" accept="image/*,video/*" onchange="openMediaPreview(this)" />
          
          <button type="button" id="vn-btn" class="btn-send" style="background:transparent; font-size:1.1rem;">🎙️</button>

          <input type="text" id="chat-input" placeholder="Ketik pesan..." maxlength="500" autocomplete="off" style="background:#2a3942; border:none; border-radius:8px; color:#fff;" />
          <button class="btn-send" id="chat-send" style="background:#00a884; color:#fff; border-radius:50%; width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center;">➤</button>
        </div>
      {% endif %}
    </div>

    <div class="section-ai">
      <div class="chat-header" style="background: rgba(191,95,255,.06); padding: 0.4rem 1rem;">
        <span>🤖</span>
        <span style="font-weight:600; font-size:.85rem;">STAS-AI Assistant (Privat)</span>
      </div>
      <div class="msg-list-wa" id="ai-chatbox" style="padding: 0.5rem 1rem;"></div>
      <div class="chat-input-area" style="background:#111b21; padding: 0.4rem 0.75rem;">
        <input type="text" id="ai-input" placeholder="Tanya AI Asisten..." maxlength="200" autocomplete="off" style="background:#2a3942; border:none; border-radius:8px; height:32px; font-size:0.85rem;" />
        <button class="btn-send" id="ai-send" style="background:var(--purple-neon); height:32px; padding:0 0.75rem; font-size:0.85rem;">➤</button>
      </div>
    </div>

  </div>
</div>

<div class="wa-modal" id="media-modal">
  <div class="modal-content-box">
    <div style="text-align: right; color: #fff; font-size: 1.5rem; cursor: pointer;" onclick="closeMediaPreview()">✕</div>
    <div class="modal-preview-zone" id="modal-preview-zone"></div>
    <div class="modal-input-area">
      <input type="text" id="modal-caption" placeholder="Tambah keterangan..." autocomplete="off" style="flex:1; background:transparent; border:none; color:#fff; outline:none;" />
      <button class="btn-send" id="modal-submit-btn" style="background:#00a884; color:#fff;" onclick="submitMediaUpload()">Kirim ➤</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/ai.js') }}"></script>
<script>
  const ME_NAME = {% if session.fullname %}{{ session.fullname | tojson }}{% else %}{{ session.member | tojson }}{% endif %};
  const ME_USER = {{ session.member | tojson }};
  const IS_GUEST = {% if session.is_guest %}true{% else %}false{% endif %};
  const REGISTERED_MEMBERS = {{ members | tojson }};

  const messagesBox = document.getElementById('chat-messages');
  const chatInput   = document.getElementById('chat-input');
  const chatSend    = document.getElementById('chat-send');
  const mentionBox  = document.getElementById('mention-box');
  const vnBtn       = document.getElementById('vn-btn');
  
  // Variabel untuk modal upload media
  const mediaModal = document.getElementById('media-modal');
  const previewZone = document.getElementById('modal-preview-zone');
  const modalCaption = document.getElementById('modal-caption');
  let selectedFileObject = null;

  let mediaRecorder;
  let audioChunks = [];
  let isRecording = false;
  let activeReactionMsgId = null;

  // Formatting filter text kata kunci @ nama member
  function defFilterText(text) {
    let html = escHtml(text);
    html = html.replace(/@stasai/gi, '<span class="mention-tag">@stasai</span>');
    REGISTERED_MEMBERS.forEach(m => {
      let regex = new RegExp(`@${m.username}`, 'gi');
      html = html.replace(regex, `<span class="mention-tag">@${m.username}</span>`);
    });
    return html;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── RENDER BUBBLE MODEL WA ASLI ───
  function renderMsg(msg) {
    const isOwn = msg.username === ME_USER;
    const wrap = document.createElement('div');
    wrap.className = 'wa-bubble-wrap' + (isOwn ? ' own' : '');
    wrap.setAttribute('id', `wrap-${msg.id}`);

    // Olah display total reaksi emoji
    let reactionBadgeHtml = '';
    let totalReact = 0;
    for (let emo in msg.reactions) {
      if (msg.reactions[emo].length > 0) {
        reactionBadgeHtml += `<span>${emo}</span>`;
        totalReact += msg.reactions[emo].length;
      }
    }
    if(totalReact > 0) {
      reactionBadgeHtml = `<div class="badge-reactions">${reactionBadgeHtml} <sub style="color:rgba(255,255,255,0.6);">${totalReact}</sub></div>`;
    }

    // Blok media jika ada foto/video/audio
    let mediaHtml = '';
    if (msg.type === 'image') {
      mediaHtml = `<div style="margin-bottom:4px;"><img src="${msg.file_url}" style="max-width:100%; border-radius:6px; max-height:220px; cursor:pointer;" onclick="window.open(this.src)"/></div>`;
    } else if (msg.type === 'video') {
      mediaHtml = `<div style="margin-bottom:4px;"><video src="${msg.file_url}" controls style="max-width:100%; border-radius:6px; max-height:220px;"></video></div>`;
    } else if (msg.type === 'audio') {
      mediaHtml = `
        <div class="custom-vn-player">
          <span style="font-size:1.1rem;">🎙️</span>
          <audio src="${msg.file_url}" controls controlsList="nodownload"></audio>
        </div>`;
    }

    let deleteBtnHtml = (ME_USER === 'rauf') ? `<span style="cursor:pointer; color:#ff4136; font-size:0.65rem; margin-right:8px;" onclick="deleteMessage(event, '${msg.id}')">🗑️ Hapus</span>` : '';

    // Isi Konten Bubble
    wrap.innerHTML = `
      <div class="wa-bubble" onclick="toggleReactionPopup(event, '${msg.id}')">
        ${!isOwn ? `<div style="font-weight:700; font-size:0.75rem; color:#53bdeb; margin-bottom:2px;">${msg.sender}</div>` : ''}
        
        ${mediaHtml}
        
        <div style="font-size:0.88rem; line-height:1.4; word-break:break-word; padding-right:10px;">
          ${defFilterText(msg.text)}
        </div>
        
        <div class="wa-meta-row">
          ${deleteBtnHtml}
          <span>${msg.ts}</span>
        </div>

        ${reactionBadgeHtml}
      </div>
    `;
    messagesBox.appendChild(wrap);
  }

  // INTERAKSI TEKAN BUBBLE UNTUK MUNCULIN PILIHAN EMOJI ALA WA
  function toggleReactionPopup(e, msgId) {
    e.stopPropagation();
    if(IS_GUEST) return;

    // Bersihkan popup lama jika ada
    closeAllReactionPopups();

    const bubbleElement = e.currentTarget;
    activeReactionMsgId = msgId;

    const popup = document.createElement('div');
    popup.className = 'reaction-popup';
    popup.id = `popup-${msgId}`;
    popup.innerHTML = `
      <span onclick="triggerReact('${msgId}', '👍')">👍</span>
      <span onclick="triggerReact('${msgId}', '❤️')">❤️</span>
      <span onclick="triggerReact('${msgId}', '😂')">😂</span>
      <span onclick="triggerReact('${msgId}', '😮')">😮</span>
      <span onclick="triggerReact('${msgId}', '🙏')">🙏</span>
    `;

    bubbleElement.appendChild(popup);
  }

  function closeAllReactionPopups() {
    const activePopups = document.querySelectorAll('.reaction-popup');
    activePopups.forEach(p => p.remove());
    activeReactionMsgId = null;
  }

  async function triggerReact(msgId, emoji) {
    try {
      await fetch('/api/chat/react', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msg_id: msgId, emoji: emoji })
      });
      fetchChat();
    } catch(e) { console.error(e); }
  }

  // ENGINE REFRESH / POLLING DATA CHAT
  async function fetchChat() {
    try {
      const res = await fetch('/api/chat');
      const data = await res.json();
      
      const wasAtBottom = messagesBox.scrollHeight - messagesBox.scrollTop <= messagesBox.clientHeight + 80;
      messagesBox.innerHTML = '';
      
      data.forEach(renderMsg);
      if (wasAtBottom) { messagesBox.scrollTop = messagesBox.scrollHeight; }
    } catch(e) { console.error(e); }
  }

  async function sendChat() {
    if(IS_GUEST) return;
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    mentionBox.style.display = 'none';
    try {
      await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, type: 'text' })
      });
      fetchChat();
    } catch(e) { console.error(e); }
  }

  async function deleteMessage(e, msgId) {
    e.stopPropagation();
    if(confirm("Hapus pesan ini dari semua member?")) {
      try {
        await fetch(`/api/chat/delete/${msgId}`, { method: 'DELETE' });
        fetchChat();
      } catch(e) { console.error(e); }
    }
  }

  // ─── ALUR KERJA PREVIEW MEDIA DENGAN TEKS CAPTION (MIRIP WA) ───
  function openMediaPreview(inputElement) {
    if(IS_GUEST || inputElement.files.length === 0) return;
    selectedFileObject = inputElement.files[0];

    // Buat URL lokal buat ditampilin di kotak pratinjau modal
    const localUrl = URL.createObjectURL(selectedFileObject);
    previewZone.innerHTML = '';

    if (selectedFileObject.type.startsWith('video/')) {
      previewZone.innerHTML = `<video src="${localUrl}" controls></video>`;
    } else {
      previewZone.innerHTML = `<img src="${localUrl}" alt="Preview" />`;
    }

    modalCaption.value = ''; // Kosongkan caption lama
    mediaModal.style.display = 'flex'; // Nyalakan Modal WA
  }

  function closeMediaPreview() {
    mediaModal.style.display = 'none';
    selectedFileObject = null;
    document.getElementById('file-input').value = '';
  }

  async function submitMediaUpload() {
    if(!selectedFileObject || IS_GUEST) return;
    
    const submitBtn = document.getElementById('modal-submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = "Mengirim...";

    const formData = new FormData();
    formData.append('file', selectedFileObject);

    try {
      // 1. Upload filenya dulu ke backend server
      const res = await fetch('/api/chat/upload', { method: 'POST', body: formData });
      const meta = await res.json();
      
      if(meta.file_url) {
        // 2. Ambil teks caption yang ditulis user di modal
        const captionText = modalCaption.value.trim() || `Kirim berkas ${meta.type}`;
        
        // 3. Post pesan chat gabungan berkas + teks caption
        await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: captionText, type: meta.type, file_url: meta.file_url })
        });
        
        fetchChat();
      }
    } catch(e) { console.error(e); }

    submitBtn.disabled = false;
    submitBtn.textContent = "Kirim ➤";
    closeMediaPreview();
  }

  // ─── FITUR VOICE NOTE AUDIO ───
  if(vnBtn && !IS_GUEST) {
    vnBtn.addEventListener('click', async () => {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('file', new File([audioBlob], "vn.webm", { type: 'audio/webm' }));
            
            vnBtn.style.color = '#fff';
            vnBtn.textContent = '🎙️';
            
            const res = await fetch('/api/chat/upload', { method: 'POST', body: formData });
            const meta = await res.json();
            if(meta.file_url) {
              await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: "Voice Note 🎙️", type: 'audio', file_url: meta.file_url })
              });
              fetchChat();
            }
          };
          
          mediaRecorder.start();
          isRecording = true;
          vnBtn.style.color = '#ff4136';
          vnBtn.textContent = '🛑';
        } catch(err) { alert("Mic error atau ditolak!"); }
      } else {
        mediaRecorder.stop();
        isRecording = false;
      }
    });
  }

  // AUTOCOMPLETE SUGGEST DROPDOWN TAG @ MEMBER
  if (chatInput && !IS_GUEST) {
    chatInput.addEventListener('input', (e) => {
      const val = e.target.value;
      const atIndex = val.lastIndexOf('@');
      
      if (atIndex !== -1 && atIndex === val.length - 1) {
        mentionBox.innerHTML = '<div class="mention-item" onclick="insertMention(\'stasai\')">🤖 stasai (Grup AI)</div>';
        REGISTERED_MEMBERS.forEach(m => {
          mentionBox.innerHTML += `<div class="mention-item" onclick="insertMention('${m.username}')">👤 ${m.username}</div>`;
        });
        mentionBox.style.display = 'block';
      } else if (atIndex === -1 || val.endsWith(' ')) {
        mentionBox.style.display = 'none';
      }
    });
  }

  function insertMention(username) {
    const val = chatInput.value;
    const atIndex = val.lastIndexOf('@');
    chatInput.value = val.substring(0, atIndex) + `@${username} `;
    mentionBox.style.display = 'none';
    chatInput.focus();
  }

  if(chatSend && chatInput) {
    chatSend.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendChat(); });
  }

  fetchChat();
  setInterval(fetchChat, 2000);
</script>
</body>
</html>
