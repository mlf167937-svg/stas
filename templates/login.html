<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · STAS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark">S</div>
        <h1>Sign in to STAS</h1>
        <p>Sang Tuan Alhidayah Sutam community portal</p>
      </div>

      {% if error %}
      <div class="login-error">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11" r="0.75" fill="currentColor"/></svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="field-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g. admin" autocomplete="username" required autofocus>
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>

      <div class="login-hint">
        Demo access &middot; try <code>admin</code> / <code>stas2026</code>
      </div>
    </div>
  </div>
</body>
</html>
