<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAS System - Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-layout { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .login-box { width: 100%; max-width: 400px; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .form-group label { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; }
        .form-input { padding: 12px; border-radius: 6px; border: 1px solid var(--border-color); background-color: var(--bg-dark); color: var(--text-primary); font-size: 0.95rem; outline: none; }
        .form-input:focus { border-color: var(--nav-active); }
        .submit-btn { width: 100%; padding: 12px; font-weight: bold; background-color: var(--name-green); color: #0d1117; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 10px; transition: opacity 0.2s; }
        .submit-btn:hover { opacity: 0.9; }
        .err-banner { background-color: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85149; padding: 12px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body class="page-transition">
    <div class="login-layout">
        <div class="login-box">
            <h2 style="text-align: center; margin-bottom: 4px;">STAS COMMUNITY</h2>
            <p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px;">Sang Tuan Alhidayah Sutam</p>
            
            {% if error %}
                <div class="err-banner">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>ID Anggota (Filename ID)</label>
                    <input type="text" name="username" class="form-input" placeholder="Contoh: 101" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Masukkan password Anda" required>
                </div>
                <button type="submit" class="submit-btn">Masuk Ke Sistem</button>
            </form>
        </div>
    </div>
</body>
</html>
