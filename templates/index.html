<!DOCTYPE html>
<html>
<head>
  <title>STAS Community</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header>
  <div class="title">STAS COMMUNITY</div>
  <div class="subtitle">Sang Tuan Alhidayah Sutam</div>
</header>

<section class="container">

  {% for m in members %}
  <div class="card">

    <div class="avatar">
      {{ m.nama[0] }}
    </div>

    <div class="info">
      <h3>{{ m.nama }}</h3>
      <p>{{ m.desk }}</p>
      <span>ID: {{ m.id }}</span>
    </div>

  </div>
  {% endfor %}

</section>

</body>
</html>
